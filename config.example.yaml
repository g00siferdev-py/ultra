# Copy this file to config.local.yaml (dev) or /etc/ultra/config.yaml (on the Pi)
#
# Two separate things live in this file:
#   1. LLM settings  — how Ultra thinks (Ollama, OpenAI, Anthropic)
#   2. channels      — how Ultra reaches YOU (Discord, Telegram, email)

# =============================================================================
# LLM — your AI provider (this is the "brain")
# =============================================================================

provider: ollama
# Which backend to use:
#   ollama     — Ollama (local or ollama.com cloud)
#   openai     — api.openai.com
#   anthropic  — api.anthropic.com

api_key: ""
# Ollama cloud API key from https://ollama.com/settings/keys
# Also reads OLLAMA_API_KEY env var (same as Persistent Sage / Snowball).
# Not needed for purely local models on localhost.

model: kimi-k2.5:cloud
# Model name. Cloud examples: kimi-k2.5:cloud, qwen3.5:397b-cloud
# Local examples: llama3.1, qwen2.5:7b

ollama_base_url: "https://ollama.com/v1"
# Use https://ollama.com/v1 when authenticating with an Ollama API key (cloud).
# Use http://localhost:11434/v1 for local models without a key.

# =============================================================================
# Agent behavior
# =============================================================================

workspace: workspace
tasks_dir: tasks
audit_log: logs/audit.log
extra_instructions: ""

# =============================================================================
# Companion personality (Persistent Sage-compatible personality.json)
# =============================================================================
# Defines tone, values, and relationship style. The agent can read/edit this file
# via personality_get / personality_update tools when you ask it to change behavior.

personality:
  enabled: true
  path: ""                   # default: workspace/personality.json (or PS data dir)
  persistent_sage_compat: true

# =============================================================================
# Memory Anchor (Persistent Sage-compatible RAG)
# =============================================================================
# Chat uses Ollama Cloud (or your configured provider).
# Embeddings use baked-in fastembed ONNX — no Ollama install required on Linux Ultra.

memory:
  enabled: true
  database: ""  # optional path to nova_memory.sqlite; auto-detects Persistent Sage data dir
  persistent_sage_compat: true
  personality_id: ultra  # use "default" to share anchors with Persistent Sage desktop
  semantic_enabled: true
  embed_backend: fastembed   # fastembed (default, baked into Pi image) | ollama
  embed_model: nomic-embed-text
  embed_cache_dir: ""        # Pi image: /var/lib/ultra/fastembed (preloaded)
  embed_ollama_url: "http://127.0.0.1:11434"  # only if embed_backend: ollama
  auto_recall: true
  auto_store: true
  auto_embed: true
  embed_batch_size: 8        # small batches — fast on Pi, run often
  embed_startup_batches: 3   # max batches when agent starts (avoid hour-long block)
  embed_backlog_alert: 50   # Discord/Telegram alert if pending exceeds this
  recall_limit: 8

# =============================================================================
# Smart home — bundled Home Assistant on Linux Ultra Pi image
# =============================================================================
# The Pi image runs Home Assistant in Docker on port 8123 (systemd: ultra-homeassistant).
# Create a long-lived token in the HA UI, then save it here or in token_file.

smart_home:
  home_assistant:
    enabled: true
    url: "http://127.0.0.1:8123"
    token: ""
    token_file: ""   # Pi default: /var/ultra/workspace/projects/smart-home/secrets/ha-token.txt

# =============================================================================
# Notification channels — how the agent contacts YOU (optional)
# =============================================================================
# These are NOT for the LLM. Discord/Telegram/email are outbound alerts only.
# Configure whichever you want; leave the rest blank.

channels:
  telegram:
    bot_token: ""
    chat_id: ""
  discord:
    webhook_url: ""
  email:
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    from: "ultra@local"
    to: ""

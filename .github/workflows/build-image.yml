name: Build Linux Ultra Pi Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - "iso/**"
      - "src/**"
      - "deploy/**"
      - "pyproject.toml"
      - ".github/workflows/build-image.yml"

# Cancel in-progress runs for the same ref
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            parted \
            dosfstools \
            rsync \
            curl \
            gnupg \
            xz-utils \
            e2fsprogs \
            util-linux

      - name: Enable qemu arm64
        run: |
          sudo update-binfmts --enable qemu-aarch64
          ls /proc/sys/fs/binfmt_misc/

      - name: Build image
        env:
          # Smaller image for CI; expands to full NVMe on first boot
          IMAGE_SIZE: 3G
          IMAGE_NAME: linux-ultra-pi5-1.0.img
        run: |
          chmod +x iso/build.sh iso/scripts/chroot-setup.sh
          sudo -E ./iso/build.sh

      - name: Compress image
        run: |
          cd dist
          sha256sum linux-ultra-pi5-1.0.img > linux-ultra-pi5-1.0.img.sha256
          xz -9 -T0 -k linux-ultra-pi5-1.0.img
          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ultra-pi5-image
          path: |
            dist/linux-ultra-pi5-1.0.img.xz
            dist/linux-ultra-pi5-1.0.img.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux-ultra-pi5-1.0.img.xz
            dist/linux-ultra-pi5-1.0.img.sha256
          generate_release_notes: true
